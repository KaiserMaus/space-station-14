- type: entity
  id: MailSovietSpamLetter100
  name: Workers' rights!
  suffix: 100%
  description: A propaganda pamphlet that smells of burnt matches. It's so thick it won't fit in the fax.
  parent: [ Paper ] # ,BaseSovietContraband]
  components:
    - type: Paper
      content: delivery-spam-join-soviets
      editingDisabled: true
    - type: PaperVisuals
      headerImagePath: "/Textures/_Sunrise/CopyMachine/soviet_form_header.rsi/soviet_form_header.png"
    - type: AntagOnSign
      chance: 1
      antags:
        - antag: Revolutionary
          targetComponent: RevolutionaryRule

      blacklist:
        components:
          - NukeOperative
          - MindShield
          - Traitor
          - Revolutionary


