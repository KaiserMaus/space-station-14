- type: entity
  name: paper
  parent: BasePaper
  id: PaperNoFax
  description: 'A piece of white paper.'
  components:
  - type: Sprite
    sprite: Objects/Misc/bureaucracy.rsi
    layers:
    - state: paper
    - state: paper_words
      map: ["enum.PaperVisualLayers.Writing"]
      visible: false
    - state: paper_stamp-generic
      map: ["enum.PaperVisualLayers.Stamp"]
      visible: false
  - type: Paper
  - type: PaperLabelType
  - type: ActivatableUI
    key: enum.PaperUiKey.Key
    requiresComplex: false
  - type: UserInterface
    interfaces:
      enum.PaperUiKey.Key:
        type: PaperBoundUserInterface
  - type: PaperVisuals
  # Sunrise edit end
  - type: PhysicalComposition
    materialComposition:
      Paper: 100
  # Sunrise edit end

- type: entity
  id: MailSyndicateSpamLetter
  name: reasons to choose The Syndicate!
  description: An advertisement for the Syndicate. Wont fit in a fax somehow.
  parent: [ PaperNoFax, BaseSyndicateContraband ]
  components:
    - type: Paper
      content: delivery-spam-reasons-to-join-syndicate
    - type: AntagOnSign
      chance: 0.25
      antags:
        - antag: Traitor
          targetComponent: TraitorRule

      blacklist:
        components:
          - NukeOperative
          - Traitor
          - Revolutionary


- type: entity
