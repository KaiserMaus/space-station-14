# Pirate has a pirate setting, with old spacesuits and ancient weapons.
###
# Privateer(Каппер) mix of mercenary, ussp and syndicate style, with USSP variant spacesuits and USSP and Syndi tier weapons.
###
# Scrappers has a Salvage style, with Salvage variant spacesuits and industrial tier weapons. PKA, Crushers etc.
