- type: entity
  id: ComputerPirateShipyard
  parent: ComputerShipyard
  name: pirate shipyard console
  description: Use a shuttle voucher here to deploy a purchased shuttle or sell the current one.
  components:
  - type: Sprite
    layers:
    - map: ["computerLayerBody"]
      state: rusted
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: bounty
    - map: ["computerLayerKeys"]
      state: security_key
    - type: PirateShipyardConsole
    - type: Computer
      board: PirateShipyardComputerCircuitboard
    - type: PointLight
      color: "#a15608"

- type: entity
  parent: BaseComputerShuttle
  id: ComputerPirateShuttle
  name: pirate ship console
  description: Used to pilot a pirate ship.
  components:
    - type: Sprite
      sprite: _Sunrise/Structures/Machines/pirate_computers.rsi
      layers:
        - map: [ "computerLayerBody" ]
          state: computer
        - map: [ "computerLayerKeyboard" ]
          state: generic_keyboard
        - map: [ "computerLayerScreen" ]
          state: shuttle
        - map: [ "computerLayerKeys" ]
          sprite: Structures/Machines/computers.rsi
          state: syndie_key
        - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
          state: generic_panel_open
    - type: Tag
      tags:
        - Pirate
    - type: RadarConsole
      maxRange: 384
    - type: WorldLoader
      radius: 1536
    - type: PointLight
      radius: 1.5
      energy: 1.6
      color: "#c94242"
    - type: Computer
      board: PirateShuttleCircuitboard

- type: entity
