- type: entity
  parent: BaseGameRule
  id: SiliconLiberation
  components:
  - type: SELFRule
  - type: AntagObjectives
    objectives:
    - SiliconRightsObjective
    - FreeAIObjective
    - FreeBorgsObjective
  - type: AntagSelection
    agentName: self-round-end-agent-name
    selectionTime: IntraPlayerSpawn
    definitions:
    - prefRoles: [ SELFAgent ]
      max: 3
      startingGear: SELFAgentGear
      mindRoles:
      - MindRoleSELFAgent
      briefing:
        sound: "/Audio/_Sunrise/Ambience/Antag/self_greeting.ogg"
  - type: DynamicRuleCost
    cost: 70

- type: entity
  parent: BaseGameRule
  id: Vampire
  components:
  - type: GameRule
    delay:
      min: 600
      max: 900
  - type: VampireRule
  - type: AntagObjectives
    objectives:
    - VampireDrainObjective
  - type: AntagRandomObjectives
    sets:
    - groups: VampireObjectiveGroups
    maxDifficulty: 7
  - type: AntagSelection
    agentName: vampire-roundend-name
    definitions:
    - prefRoles: [ Vampire ]
      max: 3
      playerRatio: 30
      lateJoinAdditional: true
      mindRoles:
      - MindRoleVampire
  - type: DynamicRuleCost
    cost: 125
