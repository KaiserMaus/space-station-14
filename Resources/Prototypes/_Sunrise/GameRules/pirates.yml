- type: entity
  abstract: true
  parent: BaseGameRule
  id: BasePiratesRule
  components:
    - type: PiratesRule
    - type: RuleGrids
    - type: AntagSelection
      agentName: pirate-list-start
    - type: AntagLoadProfileRule
    - type: DynamicRuleCost
      cost: 150

- type: entity
  parent: BasePiratesRule
  id: Pirates
  components:
    - type: GameRule
      minPlayers: 20
    - type: StationEvent
      earliestStart: 10
      minimumPlayers: 20
      duration: null
      reoccurrenceDelay: 60
      startAnnouncement: null
      maxOccurrences: 1
    - type: AntagSelection
      definitions:
        - prefRoles: [ PirateCaptain ]
          fallbackRoles: [ PirateCrew ]
          spawnerPrototype: SpawnPointPirateCaptain
          startingGear: PirateCaptainGear
          roleLoadout:
            - RoleSurvivalEVA
          briefing:
            text: pirate-role-greeting
            color: "#a15608"
            sound:
              path: /Audio/Ambience/Antag/pirate_start.ogg
              params:
                volume: -12
          components:
            - type: PirateAccent
            - type: PirateIcon
            - type: NpcFactionMember
              factions:
                - Pirate
            - type: RandomMetadata
              nameSegments:
                - Adjectives
              nameFormat: name-format-pirate-captain
          mindRoles:
            - MindRolePirateCaptain
        - prefRoles: [ PirateCrew ]
          fallbackRoles: [ PirateCaptain ]
          spawnerPrototype: SpawnPointPirateCrew
          min: 2
          max: 9
          playerRatio: 13
          startingGear: PirateGear
          roleLoadout:
            - RoleSurvivalEVA
          briefing:
            text: pirate-role-greeting
            color: "#a15608"
            sound:
              path: /Audio/Ambience/Antag/pirate_start.ogg
              params:
                volume: -12
          components:
            - type: PirateAccent
            - type: PirateIcon
            - type: NpcFactionMember
              factions:
                - Pirate
            - type: RandomMetadata
              nameSegments:
                - NamesFirst
                - Adjectives
              nameFormat: name-format-pirate-crew
          mindRoles:
            - MindRolePirate
