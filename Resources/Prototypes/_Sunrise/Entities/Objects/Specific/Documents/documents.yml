        «Федерация магов» представляет собой нетипичную и потенциально высокоопасную группу. Субъекты заявляют о владении «магией», используя неизвестные технологии для создания эффектов, природа которых до конца не установлена.

        Исследования показывают, что «Федерация» с высокой вероятностью не является формализованной организацией, а представляет собой разрозненное сообщество сторонников и самозванцев.

        Независимо от происхождения наблюдаемых эффектов, они способны причинить значительный ущерб. При контакте с лицами, идентифицирующими себя как «маги», рекомендуется повышенная осторожность.
        [/mono]

