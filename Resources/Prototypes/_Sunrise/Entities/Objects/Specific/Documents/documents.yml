- type: entity
  parent: BaseItem
  id: BaseImportantDocument
  abstract: true
  description: Looks highly classified!
  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Specific/Documents/document.rsi
    layers:
    - state: background_messy
      map: [ "background" ]
    - state: bribe
      map: [ "bribe" ]
    - state: document
    - state: line
      map: [ "label" ]
  - type: Paper
    contentSize: 12000
    editingDisabled: true
  - type: ActivatableUI
    key: enum.PaperUiKey.Key
    requiresComplex: false
  - type: UserInterface
    interfaces:
      enum.PaperUiKey.Key:
        type: PaperBoundUserInterface
  - type: Tag
    tags:
      - Document
      - Paper
      - HighRiskItem
  - type: Item
    size: Normal
  - type: RandomSprite
    getAllGroups: true
    available:
      - background:
          background_messy: ""
          background_clean: ""
          background_large: ""
      - bribe:
          bribe: ""
          empty: ""
      - label:
          line: Departmental
          stamp: Departmental

### Classified Corporate Documents

- type: entity
  id: ClassifiedCorporateDocumentAbductors
  name: classified corporate documents
  categories: [ DoNotMap ]
  description: A set of highly classified documents containing Corporate Secrets.
  parent: [ BaseImportantDocument, BaseCommandContraband ]
  components:
    - type: XmlPaperContent
      path: /Documents/_Sunrise/Classified/classified_corporate_abductors.xml
      header:
        sprite: /Textures/_Sunrise/CopyMachine/paper_headers.rsi
        state: nanotrasen_form_header_centcom
    - type: StealTarget
      stealGroup: CorporateSecretsSteal

