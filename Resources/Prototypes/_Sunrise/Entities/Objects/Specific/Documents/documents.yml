        Ксеноборги — класс силиконов, разработанных ксеносами. Имеющиеся данные указывают, что первые образцы были созданы более тысячи лет назад; после исчезновения ксеносов их силиконы перешли в неактивное состояние.

        Первые наблюдения ксеноборгов на периферии Транс-Солярной Федерации датируются 3023 годом (2 случая). В 3024 году — 6 случаев, в 3025 — более 50, а в 3026 появления стали регулярными.

        Данная динамика указывает на возможное существование крупного мигрирующего флота ксеноборгов, движущегося к центральным мирам, с сектором Sunrise и ТСФ на предполагаемом маршруте.

        Это совпадает с недавним появлением Улья ксеносов в ████, направляющегося к Сол из ███ █████████ ███████ ███████ ██ ███ ████ ██ ███ ██████. NanoTrasen была развёрнута в полном объёме в █████████ для ██████ и с тех пор ведёт активные боевые действия.
        [/mono]

