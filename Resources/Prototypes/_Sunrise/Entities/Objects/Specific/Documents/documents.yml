- type: entity
  parent: BaseItem
  id: BaseImportantDocument
  abstract: true
  description: Looks highly classified!
  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Specific/Documents/document.rsi
    layers:
    - state: background_messy
      map: [ "background" ]
    - state: bribe
      map: [ "bribe" ]
    - state: document
    - state: line
      map: [ "label" ]
  - type: Paper
    contentSize: 12000
    editingDisabled: true
  - type: ActivatableUI
    key: enum.PaperUiKey.Key
    requiresComplex: false
  - type: UserInterface
    interfaces:
      enum.PaperUiKey.Key:
        type: PaperBoundUserInterface
  - type: Tag
    tags:
      - Document
      - Paper
      - HighRiskItem
  - type: Item
    size: Normal
  - type: RandomSprite
    getAllGroups: true
    available:
      - background:
          background_messy: ""
          background_clean: ""
          background_large: ""
      - bribe:
          bribe: ""
          empty: ""
      - label:
          line: Departmental
          stamp: Departmental

### Classified Corporate Documents

- type: entity
  id: ClassifiedCorporateDocumentAbductors
  name: classified corporate documents
  categories: [ DoNotMap ]
  description: A set of highly classified documents containing Corporate Secrets.
  parent: [ BaseImportantDocument, BaseCommandContraband ]
  components:
    - type: Paper
      content: |-
        [head=1][color=#135285]────────────────────[/color][/head]
        [color=#1b67a5]█▄░░█ ▀▀█▀▀[/color] [head=3] [color=#135285]NanoTrasen[/color][/head]
        [color=#1b67a5]█▀█▄█ ░░█░░[/color] [head=3] [color=#135285]Representative[/color][/head]
        [color=#1b67a5]█░░▀█ ░░█░░[/color]  [color=#aaaaaa][italic]ОФИЦИАЛЬНЫЙ КОРПОРАТИВНЫЙ ДОКУМЕНТ[/italic][/color]
        [head=1][color=#135285]────────────────────[/color][/head]
        [head=2][color=#135285][bold]Секретный корпоративный документ[/bold][/color][/head]
        [head=1][color=#135285]────────────────────[/color][/head]
        [mono]
        [bold]Объект:[/bold] Абдукторы
        [bold]Принадлежность:[/bold] Неизвестно
        [bold]Цели:[/bold] Неизвестно

        Центральный отдел безопасности установил и подтвердил достоверность сведений об «Абдукторах», действующих в секторе Sunrise и нацеленных на подрядчиков Центрального Командования.

        Отчёты остаются ненадёжными: жертвы похищений возвращаются под сильным медикаментозным воздействием, дезориентированными, а иногда и без сознания.

        Хирургические осмотры показали, что цель похищений — удаление сердца и замена его неизвестной железой неустановленного происхождения. Эффекты операции крайне вариативны; при выявлении рекомендуется немедленное удаление железы.

        Конечная цель этих похищений остаётся неизвестной.
        [/mono]

        [head=1][color=#135285]────────────────────[/color][/head]
    - type: StealTarget
      stealGroup: CorporateSecretsSteal

- type: entity
  id: ClassifiedCorporateDocumentDecimus
  name: classified corporate documents
  categories: [ DoNotMap ]
  description: A set of highly classified documents containing Corporate Secrets.
  parent: [ BaseImportantDocument, BaseCommandContraband ]
  components:
    - type: Paper
      content: |-
        [head=1][color=#135285]────────────────────[/color][/head]
        [color=#1b67a5]█▄░░█ ▀▀█▀▀[/color] [head=3] [color=#135285]NanoTrasen[/color][/head]
        [color=#1b67a5]█▀█▄█ ░░█░░[/color] [head=3] [color=#135285]Representative[/color][/head]
        [color=#1b67a5]█░░▀█ ░░█░░[/color]  [color=#aaaaaa][italic]ОФИЦИАЛЬНЫЙ КОРПОРАТИВНЫЙ ДОКУМЕНТ[/italic][/color]
        [head=1][color=#135285]────────────────────[/color][/head]
        [head=2][color=#135285][bold]Секретный корпоративный документ[/bold][/color][/head]
        [head=1][color=#135285]────────────────────[/color][/head]
        [mono]
        [bold]Объект:[/bold] Танго
        [bold]Принадлежность:[/bold] ██████████ ███████ ██████, ██████████
        [bold]Цели:[/bold] Введение Кодекса «Эпсилон»

        ████ ████ █████ Танго — высокоподготовленное и жёстко контролируемое подразделение ████. Оно предназначено исключительно для крайних случаев измены, чтобы не допустить попадания критических активов NanoTrasen в руки врагов Транс-Солярной Федерации.

        В случае объявления Кодекса «Эпсилон» персонал NanoTrasen обязан укрыться, пока Танго ликвидирует всех подрядчиков Центрального Командования на объекте, включая, при необходимости, командование станции и силы частной безопасности.

        Несмотря на отсутствие подтверждённых случаев развёртывания, Танго является необходимым механизмом экстренного сдерживания. Напоминаем о ценности и высокой секретности активов, вверенных Центральному Командованию и его подрядчикам. Эти активы не должны попасть в чужие руки ни при каких обстоятельствах.

        Любое несанкционированное разглашение информации о Танго и Кодексе «Эпсилон» недопустимо. Официальная легенда: группа пиратов сняла скафандры с погибших сотрудников после засады у луны Альреши. О любой утечке информации немедленно сообщать в Центральное Командование.
        [/mono]

        [head=1][color=#135285]────────────────────[/color][/head]
    - type: StealTarget
      stealGroup: CorporateSecretsSteal

- type: entity
  id: ClassifiedCorporateDocumentNinjas
  name: classified corporate documents
  categories: [ DoNotMap ]
  description: A set of highly classified documents containing Corporate Secrets.
  parent: [ BaseImportantDocument, BaseCommandContraband ]
  components:
    - type: Paper
      content: |-
        [head=1][color=#135285]────────────────────[/color][/head]
        [color=#1b67a5]█▄░░█ ▀▀█▀▀[/color] [head=3] [color=#135285]NanoTrasen[/color][/head]
        [color=#1b67a5]█▀█▄█ ░░█░░[/color] [head=3] [color=#135285]Representative[/color][/head]
        [color=#1b67a5]█░░▀█ ░░█░░[/color]  [color=#aaaaaa][italic]ОФИЦИАЛЬНЫЙ КОРПОРАТИВНЫЙ ДОКУМЕНТ[/italic][/color]
        [head=1][color=#135285]────────────────────[/color][/head]
        [head=2][color=#135285][bold]Секретный корпоративный документ[/bold][/color][/head]
        [head=1][color=#135285]────────────────────[/color][/head]
        [mono]
        [bold]Объект:[/bold] Клан Паука
        [bold]Принадлежность:[/bold] Неизвестно
        [bold]Цели:[/bold] Кража научных разработок, саботаж

        Клан Паука — один из нескольких кланов космических ниндзя. Большинство из них действуют значительно более скрытно, однако ряд инцидентов в секторе Sunrise подтвердил существование именно этого клана.

        Космические ниндзя используют широкий спектр передовых технологий: стелс-костюмы, перчатки-накопители заряда и катаны, обеспечивающие контролируемые короткие прыжки блюспейса сквозь преграды. Источник этих технологий пока не установлен. Часть образцов изъята для исследований.

        Основной интерес Клана Паука, по всей видимости, связан с нашими научными проектами. Не исключено, что их финансирует конкурирующая корпорация, получающая от них украденные разработки и технологии в обмен на оснащение.
        [/mono]

        [head=1][color=#135285]────────────────────[/color][/head]
    - type: StealTarget
      stealGroup: CorporateSecretsSteal

