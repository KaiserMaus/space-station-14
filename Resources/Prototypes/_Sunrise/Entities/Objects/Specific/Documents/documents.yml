        Отношения между Транс-Солярной Федерацией и Союзом Советских Социалистических Планет смягчились после Войн Подов, но остаются напряжёнными и нестабильными.

        На обеих сторонах сохраняются группы, недовольные текущим статус-кво. На колониях и станциях регулярно фиксируются попытки коммунистических агитаторов разжечь анти-корпоративные настроения и создать партийные ячейки.

        Часть этих элементов вышла за рамки политической деятельности и перешла к использованию примитивного метода контроля сознания через вспышки. Метод нестабилен и поддаётся противодействию, однако при запоздалом выявлении способен привести к серьёзным последствиям.

        Импланты Mindshield были разработаны именно как контрмера и доказали эффективность против данного способа воздействия.

        Революционеры представляют значимую угрозу гражданским и корпоративным активам. При этом любые расследования должны вестись строго в правовом поле: имплантация и принудительные меры считаются инвазивными процедурами.
        [/mono]

