        [color=#C70667]█░░ █▄▄█ █▄█▄█[/color][bolditalic]  [color=#ad0101] Никто не выше закона[/color][/bolditalic]
        [color=#C70667]▀▀▀ ▀░░▀ ░▀░▀░[/color]   [color=#aaaaaa][italic]ОФИЦИАЛЬНЫЙ ДОКУМЕНТ ЮРИДИЧЕСКОГО ОТДЕЛА[/italic][/color]
        [head=1][color=#ad0101]────────────────────
        Секретный криминальный отчёт
        ────────────────────[/color][/head]
        [mono]
        [bold]Объект:[/bold] Animal Rights Consortium
        [bold]Принадлежность:[/bold] Spinward Syndicate
        [bold]Цели:[/bold] Устранение всех, кто занимается содержанием животных и скота, включая самих животных

        Организацию Animal Rights Consortium можно охарактеризовать только как радикальную и нестабильную. Заявляя о защите прав животных, на практике она действует как террористическая структура и сама же приводит к массовой гибели животных в ходе атак.

        На их счету подрывы зоопарков, нападения на выставки домашних животных и убийства ряда ксенобиологов в последние годы.

        Связи с Spinward Syndicate выглядят вынужденными и нестабильными: по имеющимся данным, даже внутри Синдиката к ним относятся настороженно.
        [/mono]

        [head=1][color=#ad0101]────────────────────[/color][/head]
    - type: StealTarget
      stealGroup: CriminalReportsSteal

