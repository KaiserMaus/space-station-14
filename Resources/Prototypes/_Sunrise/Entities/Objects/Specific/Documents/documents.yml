        Подтверждено, что, несмотря на уничтожение исходного штамма Ромерол ядерным огнём ██ ███ █████ ██ █████████, новый штамм начал появляться на космических станциях и в изолированных населённых пунктах.

        Анализ штамма и обследования инфицированных показывают, что Амбузол и Амбузол Плюс по-прежнему эффективны как методы терапии, однако источник вспышек неизвестен.

        Зафиксировано аномально высокое количество вспышек вблизи ключевых объектов NanoTrasen, Центрального Командования и Транс-Солярной Федерации, включая станции. Совпадением это не считается; вероятна координированная диверсия.

        При выявлении признаков вспышки на станции немедленно уведомить Центральное Командование.
        [/mono]

        [head=1][color=#135285]────────────────────[/color][/head]
