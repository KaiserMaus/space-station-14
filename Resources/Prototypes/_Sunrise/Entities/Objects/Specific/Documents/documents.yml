        [mono]
        [bold]Объект:[/bold] Ядерные оперативники
        [bold]Принадлежность:[/bold] Spinward Syndicate, Высшее командование Синдиката, Мародёры Горлекса
        [bold]Цели:[/bold] Ядерное уничтожение

        Ядерные оперативники, в просторечии «нюкеры» или «ядеры», — ударные отряды смертников, поддерживаемые высшим командованием Синдиката. Они действуют на верхнем уровне структуры Мародёров Горлекса под прямым командованием Эуукхо Зек'хуила.

        Состав и профиль развёртывания нерегулярны: от одиночных оперативников, вероятно предназначенных для проверки обороны, до скоординированных групп до семи человек, включая командира и полевого медика.

        По оценкам источников, одновременно существует менее 20 таких команд, и большая часть их задач связана с ролью тяжёлых силовых исполнителей для Эуукхо.

        Точный источник используемых ими ядерных боеголовок в настоящее время не установлен.
        [/mono]

        [head=1][color=#135285]────────────────────[/color][/head]
    - type: StealTarget
      stealGroup: CorporateSecretsSteal

