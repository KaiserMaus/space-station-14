  id: ClassifiedCriminalDocumentComitas
  name: classified criminal documents
  categories: [ DoNotMap ]
  description: A set of highly classified documents containing criminal reports.
  parent: [ BaseImportantDocument, BaseLawContraband ]
  components:
    - type: Paper
      content: |-
        [head=1][color=#ad0101]────────────────────[/color][/head]
        [color=#C70667]█░░ █▀▀█ █░░░█[/color] [head=3]  [color=#ad0101]INTERNAL AFFAIRS BUREAU[/color][/head]
        [color=#C70667]█░░ █▄▄█ █▄█▄█[/color][bolditalic]  [color=#ad0101] Никто не выше закона[/color][/bolditalic]
        [color=#C70667]▀▀▀ ▀░░▀ ░▀░▀░[/color]   [color=#aaaaaa][italic]ОФИЦИАЛЬНЫЙ ДОКУМЕНТ ЮРИДИЧЕСКОГО ОТДЕЛА[/italic][/color]
        [head=1][color=#ad0101]────────────────────
        Секретный криминальный отчёт
        ────────────────────[/color][/head]
        [mono]
        [bold]Объект:[/bold] Comitas Systems
        [bold]Принадлежность:[/bold] Синдикат, Spinward Syndicate
        [bold]Цели:[/bold] Сбор данных

        Comitas Systems — ныне ликвидированная корпорация, специализировавшаяся на слежении и аналитике. Компания стала пионером применения AUGVR для расследования виртуальных реконструкций событий по данным множества камер.

        Comitas тесно сотрудничала с первоначальной структурой Синдиката и финансировала устранение CEO Hephaestus Виктора Явароне в 2452 году. После утечки сведений в TSF руководство Comitas скрылось.

        Генеральный директор Comitas был задержан и ликвидирован, однако его дочь ███████ █████████ сумела избежать захвата.

        Программные и аппаратные решения Comitas глубоко интегрированы во многие системы сектора Sunrise, так как активы компании были конфискованы NanoTrasen после её демонтажа Транс-Солярной Федерацией. Это создаёт серьёзный риск безопасности, но полная замена инфраструктуры признана экономически нецелесообразной и проведена только на критически важных объектах.
        [/mono]

        [head=1][color=#ad0101]────────────────────[/color][/head]
    - type: StealTarget
      stealGroup: CriminalReportsSteal

