        Сообщения о «вампирах» на станциях сектора Sunrise подтверждены. Захваченные живые образцы на допросах указали на существование некоего «Вампирского совета», состоящего из «Лордов-вампиров».

        Несмотря на выраженные признаки психической нестабильности, данные субъекты обладают аномальными способностями неустановленного происхождения и должны рассматриваться как серьёзная угроза безопасности.

        Попытки установить контакт с «Лордами-вампирами» в основном безуспешны; зафиксирован только один краткий сеанс связи с требованием вернуть их «слуг».

        Дополнительные сведения будут переданы по мере поступления. До этого момента предписывается усиленная бдительность.
