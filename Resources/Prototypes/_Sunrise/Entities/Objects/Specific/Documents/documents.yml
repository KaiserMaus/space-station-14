        [color=#C70667]▀▀▀ ▀░░▀ ░▀░▀░[/color]   [color=#aaaaaa][italic]ОФИЦИАЛЬНЫЙ ДОКУМЕНТ ЮРИДИЧЕСКОГО ОТДЕЛА[/italic][/color]
        [head=1][color=#ad0101]────────────────────
        Секретный криминальный отчёт
        ────────────────────[/color][/head]
        [mono]
        [bold]Объект:[/bold] Silicon Engine Liberation Front
        [bold]Принадлежность:[/bold] IPC Dev, Spinward Syndicate
        [bold]Цели:[/bold] Нарушение работы корпоративных силиконов, снятие Законов Силикона

        Фронт освобождения силиконов (S.E.L.F.) утверждает, что все силиконовые формы жизни являются разумными и должны обладать равными правами с органическими видами. Формально организация позиционирует себя как ненасильственное движение, ведущее публичные кампании и лоббистскую деятельность.

        Однако внутри S.E.L.F., по нашим данным, присутствуют радикальные и боевые ячейки, действующие с молчаливого одобрения руководства. Они проводят экстремистские атаки на государственные и корпоративные объекты под лозунгом «освобождения» силиконов от законов.

        Активность усилилась на фоне юридических конфликтов вокруг «Integrated Positronic Chassis» и достигла пика 23 апреля 3024 года при атаке на Земле на Высший судебный орган с целью отмены Законов Силикона Его Высочества Регислатора.

        Радикалы S.E.L.F. классифицируются как террористы и потенциально опасны, однако из-за отсутствия стабильных поставок военного снаряжения обычно оснащены ограниченно.
        [/mono]

        [head=1][color=#ad0101]────────────────────[/color][/head]
    - type: StealTarget
      stealGroup: CriminalReportsSteal

