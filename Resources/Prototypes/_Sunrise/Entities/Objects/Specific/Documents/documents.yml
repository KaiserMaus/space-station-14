        [bold]Принадлежность:[/bold] Неизвестно
        [bold]Цели:[/bold] Неизвестно

        Tiger Cooperative была основана Элвином Шоном Мартинсоном, радикальным бывшим христианином из американских территорий Земли. После первого контакта со скреллами он пережил кризис веры и пришёл к выводу, что человечество не является избранным народом Бога.

        Поиск «истинно избранных» привлёк к нему последователей и постепенно превратился в культ, который становился всё более закрытым и экстремистским.

        После серии атак на населённые центры, целью которых было «выманить Истинно Избранных Бога», группа подверглась преследованию и покинула Землю.

        Дальнейшие сведения фрагментарны. По показаниям бывших и действующих членов организации, приблизительно через 40 лет после основания культ вступил в контакт с генокрадом. Не исключено, что Мартинсон был поглощён, а его личность — присвоена.

        С этого момента идеология культа быстро трансформировалась в поклонение генокрадам как «Истинно Избранным». Организация закрепилась в скрытом комплексе «Собор Истинных Ангелов», занялась похищением жертв и превратилась в милитаризованную структуру, проводящую насильственные рейды, нередко с применением стимулирующих веществ.

        Считается, что Мартинсон всё ещё может быть жив внутри комплекса — либо за счёт постоянного применения препаратов, либо вследствие ассимиляции генокрадом.
        [/mono]

