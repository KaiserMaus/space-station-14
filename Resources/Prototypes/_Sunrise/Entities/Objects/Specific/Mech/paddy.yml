# region Paddy
- type: entity
  id: MechPaddy
  parent: [ MechBreakageRipley, BaseMech, CombatMech, IndustrialMech, BaseSecurityContraband ]
  name: Paddy
  description: Autonomous Power Loader Unit Subtype Paddy. A Modified MK-II Ripley design intended for light security use.
  components:
  - type: Sprite
    drawdepth: Mobs
    noRot: true
    sprite: _Starlight/Objects/Specific/Mechs/Mechs/paddy.rsi
    scale: 1.08, 1.08
    layers:
    - map: [ "enum.MechVisualLayers.Base" ]
      state: base
    - state: base-sirens
      map: [ "enum.MechVisualLayers.Siren" ]
      shader: unshaded
  - type: FootstepModifier
    footstepSoundCollection:
      path: /Audio/Mecha/sound_mecha_powerloader_step.ogg
  - type: Mech
    equipmentWhitelist:
      tags:
      - PaddyMech
      - IndustrialMech
    baseState: base
    openState: base-open
    brokenState: base-broken
    mechToPilotDamageMultiplier: 0.0
    airtight: true
    maxEquipmentAmount: 4
    sirenEnabled: true
    sirenState: base-sirens
    pilotWhitelist:
      components:
        - HumanoidAppearance
  - type: Reflect
    reflectProb: 0.05
    spread: 180
    soundOnReflect: /Audio/_Starlight/Armor/Ricochet/ricochet1_1.ogg
    reflects:
    - NonEnergy
  - type: MeleeWeapon
    hidden: true
    attackRate: 1
    damage:
      types:
        Blunt: 22
        Structural: 10
    bluntStaminaDamageFactor: 1.5
  - type: MovementSpeedModifier
    baseWalkSpeed: 2.5
    baseSprintSpeed: 4
  - type: PointLight
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    radius: 5
    energy: 5
    enabled: false

- type: entity
  id: MechPaddyBattery
  parent: MechPaddy
  suffix: Battery
  components:
  - type: ContainerFill
    containers:
      mech-battery-slot:
      - PowerCageMedium

- type: entity
  id: MechPaddyFilled
  parent: MechPaddyBattery
  suffix: Battery, Filled
  components:
  - type: Mech
    startingEquipment:
      - WeaponMechCombatDisabler
      - WeaponMechCombatFlashbangLauncher
      - MechEquipmentGrabberSmall
