
- type: entity
  name: MG-100 Vindicator Minigun
  parent: BaseItem
  id: WeaponMinigunMG100
  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/HMGs/minigun/big.rsi
    state: icon
  - type: Item
    sprite: _Sunrise/Objects/Weapons/Guns/HMGs/minigun/tiny.rsi
    size: Ginormous
  - type: Gun
    minAngle: -25
    maxAngle: 25
    fireRate: 8
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/_Sunrise/Weapons/Guns/HMGs/minigun_shot.ogg
  - type: ClothingSlotAmmoProvider
  - type: SlotBasedConnectedContainer
    targetSlot: BACK
    containerWhitelist:
      tags:
      - PowerpackMinigunMG100
  - type: Appearance
  - type: Wieldable
  - type: UseDelay
    delay: 0.5
  - type: GunRequiresWield

- type: entity
  id: PowerpackMinigunMG100
  parent: BasePowerpackMG100
  components:
  - type: BallisticAmmoProvider
    mayTransfer: True
    proto: CartridgeRifle  # 556

- type: entity
  id: BasePowerpackMG100
  parent: BaseItem
  abstract: true
  components:
  - type: Tag
    tags:
    - PowerpackMinigunMG100
  - type: Item
    size: Normal
  - type: Clothing
    slots: BACK
    sprite: _Sunrise/Objects/Weapons/Guns/Powerpacks/Powerpacks/backpack.rsi
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
      - CartridgeLightRifle  # 762x39
    capacity: 1000
  - type: ClothingSpeedModifier
    walkModifier: 0.7
    sprintModifier: 0.7
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/Powerpacks/Powerpacks/backpack.rsi
    layers:
    - state: mag-0
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

- type: entity
  id: PowerpackDL6902
  parent: [BasePowerpackMG100, ClothingBackpack]
  components:
  - type: Item
    size: Ginormous
  - type: Clothing
    slots: BACK
    sprite: _Sunrise/Objects/Weapons/Guns/Powerpacks/Powerpacks/syndie_backpack.rsi
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/Powerpacks/Powerpacks/syndie_backpack.rsi
    layers:
    - state: mag-0
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
      - CartridgeHeavyRifle #CartridgeHeavyLightRifle  # 762x54
    proto: CartridgeHeavyLightRifle
    capacity: 600
  - type: ClothingSpeedModifier
    walkModifier: 0.85
    sprintModifier: 0.85
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,6,3
  - type: ExplosionResistance
    damageCoefficient: 0.1
  - type: ItemSlots
    slots:
      weapon_slot:
        ejectOnInteract: true
        whitelist:
          components:
          - ClothingSlotAmmoProvider

- type: entity
  name: DL6902 machine gun
  parent: BaseItem
  id: WeaponDL6902Feed
  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/LMGs/DL6902_feed.rsi
    state: icon
  - type: Item
    sprite: _Sunrise/Objects/Weapons/Guns/LMGs/DL6902_feed.rsi
    size: Huge
    shape:
    - 0,0,6,2
  - type: Gun
    minAngle: 5
    maxAngle: 90
    angleIncrease: 2.5
    angleDecay: 30
    fireRate: 8
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      collection: m249
      params:
        volume: 10
  - type: ClothingSlotAmmoProvider
  - type: SlotBasedConnectedContainer
    targetSlot: BACK
    containerWhitelist:
      tags:
      - PowerpackMinigunMG100
  - type: Appearance
  - type: Wieldable
  - type: UseDelay
    delay: 0.5
  - type: GunRequiresWield
  - type: SpeedModifiedOnWield
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: StaticPrice
    price: 10000
