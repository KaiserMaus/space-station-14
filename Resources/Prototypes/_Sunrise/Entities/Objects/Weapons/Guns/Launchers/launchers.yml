- type: entity
  name: RL-5
  parent: BaseWeaponLauncher
  id: WeaponLauncherRL5
  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/HMGs/rpg/big.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Sunrise/Objects/Weapons/Guns/HMGs/rpg/tiny.rsi
  - type: Item
    size: Ginormous
    sprite: _Sunrise/Objects/Weapons/Guns/HMGs/rpg/tiny.rsi
  - type: Gun
    fireRate: 0.5
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/rpgfire.ogg
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - CartridgeRocket
    proto: CartridgeRocket
    capacity: 1
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: true
  - type: Appearance
  - type: Wieldable
  - type: UseDelay
    delay: 0.5
  - type: GunRequiresWield
  - type: SpeedModifiedOnWield
    walkModifier: 0.5
    sprintModifier: 0.5
  - type: CursorOffsetRequiresWield
  - type: EyeCursorOffset
    maxOffset: 3
    pvsIncrease: 0.3

- type: entity
  name: GL-79
  parent: BaseWeaponLauncher
  id: WeaponGrenadeLauncherGL70
  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/HMGs/gl-64/big.rsi
    layers:
    - state: icon
      map: ["enum.GunVisualLayers.Base"]
  - type: Clothing
    sprite: _Sunrise/Objects/Weapons/Guns/HMGs/gl-64/tiny.rsi
  - type: Item
    size: Huge
    shape:
    - 0,0,6,2
    sprite: _Sunrise/Objects/Weapons/Guns/HMGs/gl-64/tiny.rsi
  - type: AmmoCounter
  - type: Gun
    fireRate: 1
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/grenade_launcher.ogg
  - type: ContainerContainer
    containers:
      revolver-ammo: !type:Container
  - type: RevolverAmmoProvider
    whitelist:
      tags:
      - Grenade
    proto: GrenadeFrag
    capacity: 6
    chambers: [ True, True, True, True, True, True ]
    ammoSlots: [ null, null, null, null, null, null ]
    soundEject:
      path: /Audio/Weapons/Guns/MagOut/revolver_magout.ogg
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
  - type: Wieldable
  - type: UseDelay
    delay: 0.5
  - type: GunRequiresWield
  - type: SpeedModifiedOnWield
    walkModifier: 0.5
    sprintModifier: 0.5
  - type: CursorOffsetRequiresWield
  - type: EyeCursorOffset
    maxOffset: 3
    pvsIncrease: 0.3

- type: entity
  name: GL-79
  parent: WeaponGrenadeLauncherGL70
  id: WeaponGrenadeLauncherGL70Flash
  suffix: GrenadeFlash
  components:
  - type: RevolverAmmoProvider
    whitelist:
      tags:
      - Grenade
    proto: GrenadeFlash
    capacity: 6
    chambers: [ True, True, True, True, True, True ]
    ammoSlots: [ null, null, null, null, null, null ]

- type: entity
  name: hand grenade launcher
  parent: WeaponFlareGun
  id: WeaponGrenadeLauncher
  abstract: true
  description: A compact, single-shot pistol that fires shotgun shells. Comes with a safety feature that prevents the user from fitting lethal shells inside.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Shotguns/flaregun.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
  - type: Item
    size: Small
    sprite: Objects/Weapons/Guns/Shotguns/flaregun.rsi
  - type: ItemSlots
    slots:
      gun_chamber:
        name: Chamber
        startingItem: ShellShotgunFlare
        priority: 1
        whitelist:
          tags:
            - HandGrenadeAmmo
  - type: UseDelayOnShoot
  - type: UseDelay
    delay: 0.75 #No script abuse
  - type: ContainerContainer
    containers:
      gun_chamber: !type:ContainerSlot
  - type: ChamberMagazineAmmoProvider
    autoCycle: false
    boltClosed: false
    canRack: false
    soundBoltClosed: /Audio/Weapons/Guns/Cock/revolver_cock.ogg
    soundBoltOpened: /Audio/Weapons/Guns/Cock/revolver_cock.ogg
    soundRack: /Audio/Weapons/Guns/Cock/revolver_cock.ogg
  - type: Clothing
    sprite: Objects/Weapons/Guns/Shotguns/flaregun.rsi
    quickEquip: false
    slots:
    - Belt
    - suitStorage
  - type: Appearance
  - type: Gun
    projectileSpeed: 20
    fireRate: 8
    selectedMode: SemiAuto
    availableModes:
      - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/flaregun.ogg
    bigTrigger: true

- type: entity
  name: security grenade Launcher
  parent: [WeaponGrenadeLauncher, BaseSecurityContraband]
  id: WeaponGrenadeLauncherSecurity
  description: A modification of flare gun originally designed to be used by security to launch non-lethal hand grenade, however it can also fire lethal grenade without risk.
  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/Launchers/grenadegun_security.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
  - type: Item
    size: Normal
    sprite: _Sunrise/Objects/Weapons/Guns/Launchers/grenadegun_security.rsi
  - type: ItemSlots
    slots:
      gun_chamber:
        name: Chamber
        priority: 1
        whitelist:
          tags:
            - ShellShotgun
            - HandGrenadeAmmo
  - type: Tag
    tags:
    - Sidearm
