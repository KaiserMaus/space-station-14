- type: entity
  name: BaseWeaponSniper
  parent: BaseWeaponSniper
  id: BaseWeaponSniperSunrise
  description: A rooty tooty point and shooty.
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
  - type: Item
    size: Huge
  - type: Clothing
    sprite: Objects/Weapons/Guns/Snipers/bolt_gun_wood.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: AmmoCounter
  - type: Gun
    fireRate: 0.75
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/sniper.ogg
  - type: BallisticAmmoProvider
    capacity: 10
    proto: CartridgeLightRifle
    whitelist:
      tags:
      - CartridgeLightRifle
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
        ents: []
  - type: StaticPrice
    price: 500
  - type: EmitSoundOnPickup
    sound:
      collection: SnipersPickUp
  - type: EmitSoundOnDrop
    sound:
      collection: SnipersDrop
  - type: EmitSoundOnLand
    sound:
      collection: SnipersDrop
  - type: UseDelay
    delay: 1
  - type: SpeedModifiedOnWield
    walkModifier: 0.5
    sprintModifier: 0.5
  - type: CursorOffsetRequiresWield
  - type: EyeCursorOffset
    maxOffset: 3
    pvsIncrease: 0.3
  - type: MeleeWeapon
    angle: 60
    range: 1.3
    damage:
      types:
        Blunt: 15
        Structural: 6
    bluntStaminaDamageFactor: 2.0
    attackRate: 0.75
    autoAttack: false
  - type: AltFireMelee
    attackType: Heavy

- type: entity
  name: Dragunov
  parent: [ BaseWeaponRifleSunrise, BaseSyndicateContraband ]
  id: WeaponSniperDragunov
  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/Snipers/dragunov/big.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Sunrise/Objects/Weapons/Guns/Snipers/dragunov/tiny.rsi
  - type: Item
    size: Huge
    shape:
    - 0,0,7,2
    sprite: _Sunrise/Objects/Weapons/Guns/Snipers/dragunov/tiny.rsi
  - type: GunWieldBonus
    minAngle: -0
    maxAngle: -0
  - type: Gun
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    angleIncrease: 2
    angleDecay: 3
    minAngle: 1
    maxAngle: 14
    fireRate: 3.25
    soundGunshot:
      path: /Audio/_Sunrise/Weapons/Guns/Snipers/Dragunov/dragunov_shot.ogg
      params:
        volume: -1
  - type: BallisticAmmoProvider
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/_Sunrise/Weapons/Guns/Snipers/Dragunov/dragunov_cocked.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineDragunov
        insertSound: /Audio/_Sunrise/Weapons/Guns/Snipers/Dragunov/dragunov_reload.ogg
        ejectSound: /Audio/_Sunrise/Weapons/Guns/Snipers/Dragunov/dragunov_unload.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineDragunov
      gun_chamber:
        name: Chamber
        startingItem: CartridgeHeavyLightRifle  # 762x54
        priority: 1
        whitelist:
          tags:
            - CartridgeHeavyRifle  # 762x54
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
      ballistic-ammo: !type:Container
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: GunRequiresWield
  - type: Wieldable
  - type: UseDelay
    delay: 1
  - type: SpeedModifiedOnWield
    walkModifier: 0.5
    sprintModifier: 0.5
  - type: CursorOffsetRequiresWield
  - type: EyeCursorOffset
    maxOffset: 13
    pvsIncrease: 1.5

