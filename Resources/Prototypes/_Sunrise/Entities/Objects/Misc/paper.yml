- type: entity
  parent: Paper
  id: StationGoalPaper
  name: station goal centcomm message
  description: 'It looks like you have a lot of work to do.'
  components:
    - type: Paper
      stampState: paper_stamp-centcom
      stampedBy:
      - stampedName: stamp-component-stamped-name-centcom
        stampedColor: "#bb3232"

- type: entity
  name: office paper
  parent: Paper
  id: HolographicPaper
  description: 'A plain sheet of office paper.'
  components:
  - type: PaperVisuals
    backgroundImagePath: "/Textures/_Sunrise/Interface/Paper/paper_background_holographic.svg.96pdi.png"
    backgroundPatchMargin: 16.0, 16.0, 16.0, 16.0
    contentMargin: 16.0, 16.0, 16.0, 16.0
    fontAccentColor: "#ffffff"
  - type: Paper
    defaultColor: "#07edf5"
  - type: Sprite
    sprite: /Textures/Objects/Misc/bureaucracy.rsi
    layers:
    - state: holo_paper
    - state: holo_paper_written
      map: ["enum.PaperVisualLayers.Writing"]
      visible: false
    - state: paper_stamp-generic
      map: ["enum.PaperVisualLayers.Stamp"]
      visible: false
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Sunrise/Items/Handling/multitool_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/Items/multitool_drop.ogg
  - type: EmitSoundOnUse
    sound:
      path: /Audio/_Sunrise/Abductor/holopaper_open.ogg
  - type: EmitSoundOnCollide
    sound:
      collection: WeakHit
  - type: EmitSoundOnThrow
    sound:
      collection: WeakHit

- type: entity
  parent: Paper
  id: PaperRDDiploma
  name: research director diploma
  description: A formal diploma certifying advanced research qualifications.
  components:
  - type: Paper
    content: |
      [head=2]Research Director Diploma[/head]

      This certifies that the holder is recognized as a qualified Research Director.

      [italic]Issued by NanoTrasen Academic Board[/italic]
  - type: StealTarget
    stealGroup: RDDiploma

- type: entity
  parent: Paper
  id: PaperCMOLicense
  name: chief medical officer license
  description: A formal medical license for command-level medical practice.
  components:
  - type: Paper
    content: |
      [head=2]Chief Medical Officer License[/head]

      This license authorizes command-level medical oversight and practice.

      [italic]Issued by NanoTrasen Medical Directorate[/italic]
  - type: StealTarget
    stealGroup: CMOLicense
