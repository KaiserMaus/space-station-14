- type: entity
  parent: [ ClothingOuterHardsuitBase, BaseSyndicateContraband ]
  id: ClothingOuterHardsuitPirateBlackbeard
  name: blackbeard hardsuit
  suffix: Pirate
  description: One of the most feared hardsuits in the galaxy.
  components:
  - type: Sprite
    sprite: _Sunrise/Clothing/OuterClothing/Hardsuits/blackbeard.rsi
  - type: Item
    size: Huge
  - type: Clothing
    sprite: _Sunrise/Clothing/OuterClothing/Hardsuits/blackbeard.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.05
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: StaminaResistance
    damageCoefficient: 0.75
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.7
        Slash: 0.7
        Piercing: 0.7
        Heat: 0.1
        Radiation: 0.01
        Caustic: 0.5
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: HeldSpeedModifier
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitPirateBlackbeard
  - type: Tag
    tags:
    - MonkeyWearable
    - Hardsuit
    - WhitelistChameleon

