- type: entity
  abstract: true
  parent: [ BaseItem, BaseSecurityContraband ]
  id: BaseMagazineBoxAntiMateriel
  name: ammunition box (.60 anti-materiel)
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CartridgeAntiMateriel
    proto: CartridgeAntiMateriel
    # Sunrise-start
    capacity: 14
  - type: Item
    size: Normal
    shape:
    - 0,0,1,1
    # Sunrise-end
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Boxes/anti_materiel.rsi
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: false
  - type: Appearance

# Boxes
- type: entity
  parent: BaseMagazineBoxAntiMateriel
  id: MagazineBoxAntiMateriel
  name: ammunition box (.60 anti-materiel)
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeAntiMateriel
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

# Sunrise-start
- type: entity
  id: MagazineBoxAntiMaterielBig127
  name: heavy ammo belt (13mm anti-materiel)
  description: Big ammo belt for big beast.
  parent: BaseMagazineBoxAntiMateriel
  components:
  - type: MultiHandedItem
  - type: HeldSpeedModifier
    walkModifier: 1
    sprintModifier: 0.9
  - type: Item
    size: Large
    shape:
    - 0,0,3,1
  - type: BallisticAmmoProvider
    proto: CartridgeAntiMateriel
    capacity: 30
    mayTransfer: true
    fillDelay: 0.15
  - type: ContainerContainer
